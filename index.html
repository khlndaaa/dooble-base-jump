<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dooble Base Jump</title>

<!-- Farcaster Mini App embed metadata -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://YOUR_DOMAIN/og-image.png","button":{"title":"🕹️ Play Dooble Base Jump","action":{"type":"launch_miniapp","url":"https://YOUR_DOMAIN","name":"Dooble Base Jump","splashImageUrl":"https://YOUR_DOMAIN/splash.png","splashBackgroundColor":"#060B1F"}}}' />

<style>
  :root{
    --base-blue:#0052FF;
    --base-blue-bright:#2F6BFF;
    --ink:#060B1F;
    --panel:#0B1640;
    --panel-soft:#101F52;
    --ice:#EAF1FF;
    --glow:#6FA8FF;
    --spring:#8ED9FF;
    --danger:#FF5A7A;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;
  }
  @font-face{
    font-family:'Space Grotesk';
    src:local('Space Grotesk');
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:var(--ink);
    font-family:var(--font-body);
    color:var(--ice);
    user-select:none;
  }
  #app{
    position:relative;
    width:100%;
    height:100dvh;
    max-width:480px;
    margin:0 auto;
    background:
      radial-gradient(120% 60% at 50% 0%, #123180 0%, transparent 60%),
      linear-gradient(180deg, #060B1F 0%, #0A1440 55%, #0E1D5C 100%);
    overflow:hidden;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    touch-action:none;
  }
  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px;
    pointer-events:none;
    z-index:5;
  }
  .score-pill{
    background:rgba(11,22,64,0.6);
    backdrop-filter:blur(10px);
    border:1px solid rgba(111,168,255,0.35);
    box-shadow:0 0 24px rgba(47,107,255,0.25);
    border-radius:999px;
    padding:8px 18px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:18px;
    letter-spacing:0.02em;
  }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:
      radial-gradient(90% 60% at 50% 0%, rgba(47,107,255,0.30), transparent 60%),
      rgba(6,11,31,0.88);
    backdrop-filter:blur(4px);
    z-index:10;
    padding:32px 24px;
    text-align:center;
  }
  .overlay.hidden{ display:none; }
  .logo{
    font-family:var(--font-display);
    font-weight:700;
    font-size:40px;
    line-height:1.04;
    letter-spacing:-0.01em;
    margin:0 0 4px;
    color:var(--ice);
  }
  .logo span{
    color:var(--base-blue-bright);
    text-shadow:0 0 28px rgba(47,107,255,0.65);
  }
  .tagline{
    font-size:14px;
    opacity:0.7;
    margin:0 0 28px;
    max-width:280px;
  }
  .btn{
    font-family:var(--font-display);
    font-weight:700;
    font-size:16px;
    border:none;
    border-radius:14px;
    padding:14px 28px;
    margin:6px 0;
    cursor:pointer;
    width:240px;
    transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn-primary{
    background:linear-gradient(135deg, var(--base-blue-bright), var(--base-blue) 70%);
    color:var(--ice);
    box-shadow:0 8px 24px rgba(0,82,255,0.45);
  }
  .btn-primary:active{ box-shadow:0 4px 14px rgba(0,82,255,0.4); }
  .btn:disabled{ opacity:0.5; cursor:default; }
  .stat-row{
    display:flex; gap:28px; margin:18px 0 26px;
  }
  .stat{ text-align:center; }
  .stat-num{
    font-family:var(--font-display); font-weight:700; font-size:30px;
    color:var(--ice);
    text-shadow:0 0 20px rgba(111,168,255,0.6);
  }
  .stat-label{ font-size:11px; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; }
  .controls-hint{
    position:absolute; bottom:12px; left:0; right:0;
    text-align:center; font-size:11px; opacity:0.5;
    z-index:5; pointer-events:none;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score-pill" id="scoreHud">0 m</div>
  </div>

  <div class="controls-hint" id="controlsHint">tap left / right to move</div>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h1 class="logo">Dooble Base<br/><span>Jump</span></h1>
    <p class="tagline">Jump as high as you can. Don't fall.</p>
    <button class="btn btn-primary" id="playBtn">Play</button>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h1 class="logo">Game Over!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-num" id="finalScore">0</div>
        <div class="stat-label">meters</div>
      </div>
    </div>
    <button class="btn btn-primary" id="retryBtn">Play Again</button>
  </div>
</div>

<script>
/* =========================================================
   FARCASTER MINI APP SDK — signal readiness
   ========================================================= */
(async () => {
  try {
    const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
    await sdk.actions.ready(); // hides the host's splash screen
  } catch (e) {
    console.log('Farcaster SDK not available (running outside Farcaster) — that is expected in a plain browser.');
  }
})();

/* =========================================================
   GAME: Doodle Jump clone on canvas
   ========================================================= */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, DPR;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

const GRAVITY = 0.32;
const JUMP_V = -11.5;
const SPRING_V = -19;
const PLATFORM_W = 62, PLATFORM_H = 14;
const PLAYER_W = 40, PLAYER_H = 40;

let player, platforms, camY, score, running, keys;
let lastTime = 0;

function resetGame() {
  resize();
  player = { x: W/2 - PLAYER_W/2, y: H - 140, vx: 0, vy: JUMP_V, dir: 1 };
  platforms = [];
  camY = 0;
  score = 0;
  running = true;
  keys = { left:false, right:false };

  // starting platform under the player
  platforms.push({ x: W/2 - PLATFORM_W/2, y: H - 90, type:'static', vx:0 });

  let y = H - 90;
  while (y > -H) {
    y -= 55 + Math.random()*35;
    platforms.push(spawnPlatform(y));
  }
}

function spawnPlatform(y) {
  const r = Math.random();
  const x = 20 + Math.random() * (W - 40 - PLATFORM_W);
  if (r < 0.12) return { x, y, type:'spring', vx:0 };
  if (r < 0.30) return { x, y, type:'moving', vx: (Math.random()<0.5?-1:1) * (1 + Math.random()) };
  if (r < 0.42) return { x, y, type:'breaking', vx:0 };
  return { x, y, type:'static', vx:0 };
}

function update(dt) {
  if (!running) return;

  const accel = 0.9;
  if (keys.left)  player.vx = Math.max(player.vx - accel, -6);
  else if (keys.right) player.vx = Math.min(player.vx + accel, 6);
  else player.vx *= 0.85;

  player.x += player.vx;
  if (player.x < -PLAYER_W) player.x = W;
  if (player.x > W) player.x = -PLAYER_W;

  player.vy += GRAVITY;
  player.y += player.vy;

  // camera moves up when the player is above screen-center threshold
  const threshold = H * 0.42;
  if (player.y < threshold) {
    const dy = threshold - player.y;
    player.y = threshold;
    camY += dy;
    score = Math.max(score, Math.floor(camY / 8));
    for (const p of platforms) p.y += dy;
  }

  // move moving platforms
  for (const p of platforms) {
    if (p.type === 'moving') {
      p.x += p.vx * 1.6;
      if (p.x < 10 || p.x > W - 10 - PLATFORM_W) p.vx *= -1;
    }
  }

  // collisions (only while falling)
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.dead) continue;
      const px = player.x + 6, pw = PLAYER_W - 12;
      const withinX = px + pw > p.x && px < p.x + PLATFORM_W;
      const withinY = player.y + PLAYER_H > p.y && player.y + PLAYER_H < p.y + PLATFORM_H + 14;
      if (withinX && withinY) {
        if (p.type === 'breaking') { p.dead = true; continue; }
        player.vy = p.type === 'spring' ? SPRING_V : JUMP_V;
      }
    }
  }

  // drop platforms that fell off-screen, spawn new ones above
  platforms = platforms.filter(p => p.y < H + 40 && !p.dead);
  while (platforms.length < 9) {
    const topY = Math.min(...platforms.map(p => p.y));
    platforms.push(spawnPlatform(topY - (55 + Math.random()*35)));
  }

  document.getElementById('scoreHud').textContent = score + ' m';

  if (player.y > H + 60) endGame();
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const s = 15.5; // cube half-edge in screen px
  ctx.save();
  ctx.translate(x + PLAYER_W/2, y + PLAYER_H/2 + 3);
  // subtle tilt in the direction of travel — keeps the cube feeling alive
  const tilt = Math.max(-0.22, Math.min(0.22, player.vx * 0.05));
  ctx.rotate(tilt);

  const top    = { x: 0,        y: -s * 1.65 };
  const right  = { x: s * 1.5,  y: -s * 0.78 };
  const left   = { x: -s * 1.5, y: -s * 0.78 };
  const center = { x: 0,        y: 0 };
  const botR   = { x: s * 1.5,  y: s * 0.95 };
  const botL   = { x: -s * 1.5, y: s * 0.95 };
  const botC   = { x: 0,        y: s * 1.7 };

  const glow = ctx.createRadialGradient(0, 0, 2, 0, 0, s * 2.6);
  glow.addColorStop(0, 'rgba(111,168,255,0.45)');
  glow.addColorStop(1, 'rgba(111,168,255,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0, 0, s * 2.6, 0, Math.PI * 2);
  ctx.fill();

  const drawFace = (pts, fill) => {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(234,241,255,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  };

  // left face (darkest), right face (mid), top face (brightest) — classic
  // isometric shading so the cube reads as 3D at a glance.
  drawFace([left, center, botC, botL], '#0032B8');
  drawFace([right, botR, botC, center], '#0052FF');
  drawFace([top, right, center, left], '#7FB4FF');

  // a small emblem dot on the top face — nods to the Base mark
  ctx.beginPath();
  ctx.fillStyle = 'rgba(6,11,31,0.55)';
  ctx.ellipse(0, -s * 0.78, s * 0.32, s * 0.2, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  let top = '#8ED9FF', bottom = '#2F6BFF';
  if (p.type === 'moving')   { top = '#B9D6FF'; bottom = '#1447D9'; }
  if (p.type === 'breaking') { top = '#9FB3E0'; bottom = '#3A4A8A'; }
  if (p.type === 'spring')   { top = '#EAF7FF'; bottom = '#5EEAD4'; }

  const grad = ctx.createLinearGradient(0, 0, 0, PLATFORM_H);
  grad.addColorStop(0, top);
  grad.addColorStop(1, bottom);
  ctx.fillStyle = grad;
  ctx.shadowColor = 'rgba(47,107,255,0.45)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.roundRect(0, 0, PLATFORM_W, PLATFORM_H, 7);
  ctx.fill();
  ctx.shadowBlur = 0;

  if (p.type === 'breaking') {
    ctx.strokeStyle = 'rgba(6,11,31,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W*0.35, 1); ctx.lineTo(PLATFORM_W*0.5, PLATFORM_H-1);
    ctx.moveTo(PLATFORM_W*0.68, 0); ctx.lineTo(PLATFORM_W*0.55, PLATFORM_H-2);
    ctx.stroke();
  }
  if (p.type === 'spring') {
    ctx.strokeStyle = '#0B1640'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W/2 - 8, 0);
    ctx.lineTo(PLATFORM_W/2 - 8, -10);
    ctx.lineTo(PLATFORM_W/2 + 8, -14);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGrid() {
  const spacing = 46;
  ctx.save();
  ctx.strokeStyle = 'rgba(111,168,255,0.08)';
  ctx.lineWidth = 1;
  const offsetY = camY % spacing;
  for (let y = -spacing; y < H + spacing; y += spacing) {
    const yy = y + offsetY;
    ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke();
  }
  for (let x = 0; x < W + spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  for (const p of platforms) drawPlatform(p);
  drawPlayer();
}

function loop(t) {
  const dt = t - lastTime; lastTime = t;
  update(dt);
  draw();
  if (running) requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOverScreen').classList.remove('hidden');
}

/* =========================================================
   CONTROLS
   ========================================================= */
function bindControls() {
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });
  canvas.addEventListener('touchstart', handleTouch, { passive:true });
  canvas.addEventListener('touchmove', handleTouch, { passive:true });
  canvas.addEventListener('touchend', () => { keys.left=false; keys.right=false; }, { passive:true });
  function handleTouch(e) {
    const t = e.touches[0]; if (!t) return;
    const rect = canvas.getBoundingClientRect();
    const rel = (t.clientX - rect.left) / rect.width;
    keys.left = rel < 0.5; keys.right = rel >= 0.5;
  }
}

/* =========================================================
   UI WIRING
   ========================================================= */
document.getElementById('playBtn').onclick = () => {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  resetGame();
  lastTime = performance.now();
  requestAnimationFrame(loop);
};
document.getElementById('retryBtn').onclick = () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  resetGame();
  lastTime = performance.now();
  requestAnimationFrame(loop);
};
resize();
bindControls();
</script>
</body>
</html>
