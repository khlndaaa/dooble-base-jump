<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Dooble Base Jump</title>

<!-- Farcaster Mini App embed metadata -->
<meta name="fc:miniapp" content='{"version":"1","imageUrl":"https://dooble-base-jump.vercel.app/og-image.png","button":{"title":"🕹️ Play Dooble Base Jump","action":{"type":"launch_miniapp","url":"https://dooble-base-jump.vercel.app","name":"Dooble Base Jump","splashImageUrl":"https://dooble-base-jump.vercel.app/splash.png","splashBackgroundColor":"#060B1F"}}}' />

<style>
  :root{
    --base-blue:#0052FF;
    --base-blue-bright:#2F6BFF;
    --glow:#6FA8FF;
    --spring:#8ED9FF;
    --danger:#FF5A7A;
    --font-display:'Space Grotesk', system-ui, sans-serif;
    --font-body:'Inter', system-ui, sans-serif;

    /* dark theme (default) */
    --bg-grad:
      radial-gradient(120% 60% at 50% 0%, #123180 0%, transparent 60%),
      linear-gradient(180deg, #060B1F 0%, #0A1440 55%, #0E1D5C 100%);
    --text:#EAF1FF;
    --text-dim:rgba(234,241,255,0.7);
    --panel-bg:rgba(11,22,64,0.6);
    --panel-border:rgba(111,168,255,0.35);
    --overlay-bg:
      radial-gradient(90% 60% at 50% 0%, rgba(47,107,255,0.30), transparent 60%),
      rgba(6,11,31,0.88);
    --grid-line:rgba(111,168,255,0.09);
    --toggle-icon-bg:rgba(11,22,64,0.6);
  }
  #app.light{
    --bg-grad:
      radial-gradient(120% 60% at 50% 0%, rgba(47,107,255,0.16) 0%, transparent 60%),
      linear-gradient(180deg, #F3F7FF 0%, #E4EDFF 55%, #D2E2FF 100%);
    --text:#0B1640;
    --text-dim:rgba(11,22,64,0.65);
    --panel-bg:rgba(255,255,255,0.62);
    --panel-border:rgba(47,107,255,0.28);
    --overlay-bg:
      radial-gradient(90% 60% at 50% 0%, rgba(47,107,255,0.14), transparent 60%),
      rgba(244,248,255,0.86);
    --grid-line:rgba(11,22,64,0.08);
    --toggle-icon-bg:rgba(255,255,255,0.7);
  }
  @font-face{
    font-family:'Space Grotesk';
    src:local('Space Grotesk');
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{
    margin:0; padding:0; height:100%; overflow:hidden;
    background:#060B1F;
    font-family:var(--font-body);
    user-select:none;
  }
  #app{
    position:relative;
    width:100%;
    height:100dvh;
    max-width:480px;
    margin:0 auto;
    background:var(--bg-grad);
    color:var(--text);
    overflow:hidden;
    transition:background .35s ease, color .35s ease;
  }
  canvas{
    display:block;
    width:100%;
    height:100%;
    touch-action:none;
  }
  .hud{
    position:absolute; top:0; left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-start;
    padding:14px 16px;
    z-index:5;
  }
  .score-pill{
    background:var(--panel-bg);
    backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);
    box-shadow:0 0 24px rgba(47,107,255,0.25);
    border-radius:999px;
    padding:8px 18px;
    font-family:var(--font-display);
    font-weight:700;
    font-size:18px;
    letter-spacing:0.02em;
    color:var(--text);
    pointer-events:none;
  }
  .theme-toggle{
    width:38px; height:38px;
    border-radius:50%;
    background:var(--toggle-icon-bg);
    backdrop-filter:blur(10px);
    border:1px solid var(--panel-border);
    display:flex; align-items:center; justify-content:center;
    font-size:17px;
    cursor:pointer;
    pointer-events:auto;
    transition:transform .12s ease;
  }
  .theme-toggle:active{ transform:scale(0.9); }
  .overlay{
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background:var(--overlay-bg);
    backdrop-filter:blur(4px);
    z-index:10;
    padding:32px 24px;
    text-align:center;
  }
  .overlay.hidden{ display:none; }
  .logo{
    font-family:var(--font-display);
    font-weight:700;
    font-size:40px;
    line-height:1.04;
    letter-spacing:-0.01em;
    margin:0 0 4px;
    color:var(--text);
  }
  .logo span{
    color:var(--base-blue-bright);
    text-shadow:0 0 28px rgba(47,107,255,0.45);
  }
  .tagline{
    font-size:14px;
    opacity:0.7;
    margin:0 0 28px;
    max-width:280px;
  }
  .btn{
    font-family:var(--font-display);
    font-weight:700;
    font-size:16px;
    border:none;
    border-radius:14px;
    padding:14px 28px;
    margin:6px 0;
    cursor:pointer;
    width:240px;
    transition:transform .12s ease, filter .12s ease, box-shadow .12s ease;
  }
  .btn:active{ transform:scale(0.96); }
  .btn-primary{
    background:linear-gradient(135deg, var(--base-blue-bright), var(--base-blue) 70%);
    color:#F5F9FF;
    box-shadow:0 8px 24px rgba(0,82,255,0.45);
  }
  .btn-primary:active{ box-shadow:0 4px 14px rgba(0,82,255,0.4); }
  .btn:disabled{ opacity:0.5; cursor:default; }
  .stat-row{
    display:flex; gap:28px; margin:18px 0 26px;
  }
  .stat{ text-align:center; }
  .stat-num{
    font-family:var(--font-display); font-weight:700; font-size:30px;
    color:var(--text);
    text-shadow:0 0 20px rgba(111,168,255,0.5);
  }
  .stat-label{ font-size:11px; opacity:0.6; text-transform:uppercase; letter-spacing:0.1em; }
  .controls-hint{
    position:absolute; bottom:12px; left:0; right:0;
    text-align:center; font-size:11px; opacity:0.5;
    z-index:5; pointer-events:none;
  }
  .btn-outline{
    background:var(--panel-bg);
    color:var(--text);
    border:1.5px solid var(--panel-border);
    backdrop-filter:blur(10px);
  }
  .wallet-line{
    font-size:12px; opacity:0.6; margin-top:12px; font-family:monospace;
    min-height:16px;
  }
  .save-status{
    font-size:12px; opacity:0.75; margin-top:14px; min-height:16px;
  }
  .leaderboard-list{
    width:100%; max-width:300px;
    margin:8px 0 22px;
    display:flex; flex-direction:column; gap:6px;
    max-height:38vh; overflow-y:auto;
  }
  .leaderboard-row{
    display:flex; align-items:center; justify-content:space-between;
    background:var(--panel-bg);
    border:1px solid var(--panel-border);
    border-radius:10px;
    padding:8px 12px;
    font-size:13px;
  }
  .leaderboard-rank{
    font-family:var(--font-display); font-weight:700;
    color:var(--base-blue-bright);
    width:22px;
  }
  .leaderboard-player{
    flex:1; text-align:left; margin-left:6px;
    font-family:monospace; font-size:12px; opacity:0.85;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
  }
  .leaderboard-score{
    font-family:var(--font-display); font-weight:700;
  }
  .leaderboard-empty{
    font-size:13px; opacity:0.6; margin:10px 0 22px;
  }
</style>
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div class="hud">
    <div class="score-pill" id="scoreHud">0 m</div>
    <div class="theme-toggle" id="themeToggle" title="Toggle light/dark">🌙</div>
  </div>

  <div class="controls-hint" id="controlsHint">tap left / right to move</div>

  <!-- Start screen -->
  <div class="overlay" id="startScreen">
    <h1 class="logo">Dooble Base<br/><span>Jump</span></h1>
    <p class="tagline">Jump as high as you can. Don't fall.</p>
    <button class="btn btn-primary" id="playBtn">Play</button>
    <button class="btn btn-outline" id="connectBtn">Connect Base Wallet</button>
    <button class="btn btn-outline" id="leaderboardBtn">🏆 Leaderboard</button>
    <div class="wallet-line" id="walletLine">wallet not connected</div>
  </div>

  <!-- Game over screen -->
  <div class="overlay hidden" id="gameOverScreen">
    <h1 class="logo">Game Over!</h1>
    <div class="stat-row">
      <div class="stat">
        <div class="stat-num" id="finalScore">0</div>
        <div class="stat-label">meters</div>
      </div>
    </div>
    <button class="btn btn-primary" id="retryBtn">Play Again</button>
    <button class="btn btn-outline" id="viewLeaderboardBtn">🏆 Leaderboard</button>
    <div class="save-status" id="saveStatus"></div>
  </div>

  <!-- Leaderboard screen -->
  <div class="overlay hidden" id="leaderboardScreen">
    <h1 class="logo">Top Jumpers</h1>
    <div class="leaderboard-list" id="leaderboardList"></div>
    <button class="btn btn-primary" id="closeLeaderboardBtn">Close</button>
  </div>
</div>

<script>
/* =========================================================
   FARCASTER MINI APP SDK — signal readiness
   ========================================================= */
(async () => {
  try {
    const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
    await sdk.actions.ready(); // hides the host's splash screen
    window.__fcSdk = sdk;
  } catch (e) {
    console.log('Farcaster SDK not available (running outside Farcaster) — that is expected in a plain browser.');
  }
})();

/* =========================================================
   WALLET — Base App / Farcaster wallet connection, read-only.
   Only used to identify the player for the leaderboard — no
   contract calls, no token, nothing that spends gas.
   ========================================================= */
const BASE_CHAIN_ID_HEX = '0x2105'; // 8453, Base mainnet
let walletAddress = null;

async function getEip1193Provider() {
  if (window.__fcSdk) {
    try {
      const provider = await window.__fcSdk.wallet.getEthereumProvider();
      if (provider) return provider;
    } catch (e) { /* fall through to window.ethereum */ }
  }
  return window.ethereum || null;
}

async function connectWallet() {
  const lineEl = document.getElementById('walletLine');
  const provider = await getEip1193Provider();
  if (!provider) {
    lineEl.textContent = 'no wallet found (open in Base App or install a wallet)';
    return;
  }
  try {
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    walletAddress = accounts && accounts[0];
    if (!walletAddress) { lineEl.textContent = 'no account returned'; return; }

    try {
      await provider.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: BASE_CHAIN_ID_HEX }],
      });
    } catch (switchErr) {
      console.warn('Could not switch to Base — continuing anyway, this is read-only.', switchErr);
    }

    const short = walletAddress.slice(0, 6) + '…' + walletAddress.slice(-4);
    lineEl.textContent = 'connected: ' + short;
  } catch (e) {
    console.error(e);
    lineEl.textContent = 'connection rejected';
  }
}

document.getElementById('connectBtn').addEventListener('click', connectWallet);

/* =========================================================
   LEADERBOARD — backed by a small serverless API (/api/leaderboard)
   ========================================================= */
function playerLabel() {
  if (walletAddress) return walletAddress.slice(0, 6) + '…' + walletAddress.slice(-4);
  return 'anon-' + Math.random().toString(36).slice(2, 8);
}

async function submitScore(finalScore) {
  const statusEl = document.getElementById('saveStatus');
  if (!walletAddress) {
    statusEl.textContent = 'Connect your wallet to save this run to the leaderboard.';
    return;
  }
  try {
    statusEl.textContent = 'Saving score…';
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ player: playerLabel(), score: finalScore }),
    });
    if (!res.ok) throw new Error('bad response');
    statusEl.textContent = 'Saved to the leaderboard ✅';
  } catch (e) {
    console.error(e);
    statusEl.textContent = 'Could not save score (leaderboard not set up yet?)';
  }
}

async function loadLeaderboard() {
  const listEl = document.getElementById('leaderboardList');
  listEl.innerHTML = '<div class="leaderboard-empty">Loading…</div>';
  try {
    const res = await fetch('/api/leaderboard');
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    const entries = data.leaderboard || [];
    if (entries.length === 0) {
      listEl.innerHTML = '<div class="leaderboard-empty">No runs yet — be the first to jump!</div>';
      return;
    }
    listEl.innerHTML = entries.map((e, i) => `
      <div class="leaderboard-row">
        <span class="leaderboard-rank">#${i + 1}</span>
        <span class="leaderboard-player">${e.player}</span>
        <span class="leaderboard-score">${e.score} m</span>
      </div>
    `).join('');
  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<div class="leaderboard-empty">Leaderboard not set up yet — see README.</div>';
  }
}

function openLeaderboard() {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('leaderboardScreen').classList.remove('hidden');
  loadLeaderboard();
}
document.getElementById('leaderboardBtn').addEventListener('click', openLeaderboard);
document.getElementById('viewLeaderboardBtn').addEventListener('click', openLeaderboard);
document.getElementById('closeLeaderboardBtn').addEventListener('click', () => {
  document.getElementById('leaderboardScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
});

/* =========================================================
   THEME — light / dark, toggled via a class on #app
   ========================================================= */
const appEl = document.getElementById('app');
const themeToggleBtn = document.getElementById('themeToggle');
let gridLineColor = 'rgba(111,168,255,0.09)';

function readGridLineColor() {
  gridLineColor = getComputedStyle(appEl).getPropertyValue('--grid-line').trim() || gridLineColor;
}

function setTheme(theme) {
  appEl.classList.toggle('light', theme === 'light');
  themeToggleBtn.textContent = theme === 'light' ? '☀️' : '🌙';
  readGridLineColor();
}

themeToggleBtn.addEventListener('click', () => {
  const isLight = appEl.classList.contains('light');
  setTheme(isLight ? 'dark' : 'light');
});

/* =========================================================
   GAME: Doodle Jump clone on canvas
   ========================================================= */
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W, H, DPR;
let playerGlowGradient = null; // built once on first draw, see drawPlayer()

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

const GRAVITY = 0.32;
const JUMP_V = -11.5;
const SPRING_V = -19;
const PLATFORM_W = 62, PLATFORM_H = 14;
const PLAYER_W = 40, PLAYER_H = 40;

let player, platforms, camY, score, running, keys;
let lastTime = 0;

function resetGame() {
  resize();
  player = { x: W/2 - PLAYER_W/2, y: H - 140, vx: 0, vy: JUMP_V, dir: 1 };
  platforms = [];
  camY = 0;
  score = 0;
  running = true;
  keys = { left:false, right:false };

  // starting platform under the player
  platforms.push({ x: W/2 - PLATFORM_W/2, y: H - 90, type:'static', vx:0 });

  let y = H - 90;
  while (y > -H) {
    y -= 55 + Math.random()*35;
    platforms.push(spawnPlatform(y));
  }
}

function spawnPlatform(y) {
  const r = Math.random();
  const x = 20 + Math.random() * (W - 40 - PLATFORM_W);
  if (r < 0.12) return { x, y, type:'spring', vx:0 };
  if (r < 0.30) return { x, y, type:'moving', vx: (Math.random()<0.5?-1:1) * (1 + Math.random()) };
  if (r < 0.42) return { x, y, type:'breaking', vx:0 };
  return { x, y, type:'static', vx:0 };
}

function update(dt) {
  if (!running) return;

  // Normalize everything to a 60fps baseline so the game feels the same
  // whether the device renders 60fps or drops to 30fps — without this,
  // a slower device makes the cube move in visible jumps.
  const scale = Math.min(dt / (1000 / 60), 3); // capped so a stalled tab can't cause a huge leap

  const accel = 0.9 * scale;
  if (keys.left)  player.vx = Math.max(player.vx - accel, -6);
  else if (keys.right) player.vx = Math.min(player.vx + accel, 6);
  else player.vx *= Math.pow(0.85, scale);

  player.x += player.vx * scale;
  if (player.x < -PLAYER_W) player.x = W;
  if (player.x > W) player.x = -PLAYER_W;

  player.vy += GRAVITY * scale;
  player.y += player.vy * scale;

  // camera moves up when the player is above screen-center threshold
  const threshold = H * 0.42;
  if (player.y < threshold) {
    const dy = threshold - player.y;
    player.y = threshold;
    camY += dy;
    score = Math.max(score, Math.floor(camY / 8));
    for (const p of platforms) p.y += dy;
  }

  // move moving platforms
  for (const p of platforms) {
    if (p.type === 'moving') {
      p.x += p.vx * 1.6 * scale;
      if (p.x < 10 || p.x > W - 10 - PLATFORM_W) p.vx *= -1;
    }
  }

  // collisions (only while falling)
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.dead) continue;
      const px = player.x + 6, pw = PLAYER_W - 12;
      const withinX = px + pw > p.x && px < p.x + PLATFORM_W;
      const withinY = player.y + PLAYER_H > p.y && player.y + PLAYER_H < p.y + PLATFORM_H + 14;
      if (withinX && withinY) {
        if (p.type === 'breaking') { p.dead = true; continue; }
        player.vy = p.type === 'spring' ? SPRING_V : JUMP_V;
      }
    }
  }

  // drop platforms that fell off-screen, spawn new ones above
  platforms = platforms.filter(p => p.y < H + 40 && !p.dead);
  while (platforms.length < 9) {
    const topY = Math.min(...platforms.map(p => p.y));
    platforms.push(spawnPlatform(topY - (55 + Math.random()*35)));
  }

  document.getElementById('scoreHud').textContent = score + ' m';

  if (player.y > H + 60) endGame();
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const s = 15.5; // cube half-edge in screen px
  ctx.save();
  ctx.translate(x + PLAYER_W/2, y + PLAYER_H/2 + 3);
  // subtle tilt in the direction of travel — keeps the cube feeling alive
  const tilt = Math.max(-0.22, Math.min(0.22, player.vx * 0.05));
  ctx.rotate(tilt);

  const top    = { x: 0,        y: -s * 1.65 };
  const right  = { x: s * 1.5,  y: -s * 0.78 };
  const left   = { x: -s * 1.5, y: -s * 0.78 };
  const center = { x: 0,        y: 0 };
  const botR   = { x: s * 1.5,  y: s * 0.95 };
  const botL   = { x: -s * 1.5, y: s * 0.95 };
  const botC   = { x: 0,        y: s * 1.7 };

  // gradients are always identical in this local, translated coordinate
  // space, so build once and reuse — creating one every frame is one of
  // the more expensive canvas calls and adds up on weaker devices.
  if (!playerGlowGradient) {
    playerGlowGradient = ctx.createRadialGradient(0, 0, 2, 0, 0, s * 2.6);
    playerGlowGradient.addColorStop(0, 'rgba(111,168,255,0.45)');
    playerGlowGradient.addColorStop(1, 'rgba(111,168,255,0)');
  }
  ctx.fillStyle = playerGlowGradient;
  ctx.beginPath();
  ctx.arc(0, 0, s * 2.6, 0, Math.PI * 2);
  ctx.fill();

  const drawFace = (pts, fill) => {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(234,241,255,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  };

  // ears — drawn first so the top face's edge slightly overlaps their
  // base, making them read as attached to the cube rather than floating.
  const drawEar = (cx, cy, rot, fill, inner) => {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.42, s * 0.85, 0, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(234,241,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, s * 0.12, s * 0.2, s * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = inner;
    ctx.fill();
    ctx.restore();
  };
  drawEar(-s * 0.62, -s * 2.15, -0.32, '#7FB4FF', '#0032B8');
  drawEar(s * 0.72, -s * 2.28, 0.2, '#5E9CFF', '#0032B8');

  // left face (darkest), right face (mid), top face (brightest) — classic
  // isometric shading so the cube reads as 3D at a glance.
  drawFace([left, center, botC, botL], '#0032B8');
  drawFace([right, botR, botC, center], '#0052FF');
  drawFace([top, right, center, left], '#7FB4FF');

  // one big cartoon eye on the front-right face — this is what turns a
  // geometric cube into a character.
  const eyeX = s * 0.62, eyeY = -s * 0.02;
  ctx.beginPath();
  ctx.ellipse(eyeX, eyeY, s * 0.52, s * 0.58, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#F5F9FF';
  ctx.fill();
  ctx.strokeStyle = 'rgba(11,22,64,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const lookX = Math.max(-0.5, Math.min(0.5, player.vx * 0.06));
  ctx.beginPath();
  ctx.ellipse(eyeX + s * (0.12 + lookX * 0.4), eyeY + s * 0.06, s * 0.24, s * 0.27, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#0B1640';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(eyeX + s * (0.04 + lookX * 0.4), eyeY - s * 0.08, s * 0.08, s * 0.09, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#F5F9FF';
  ctx.fill();

  ctx.restore();
}

const platformGradients = {}; // cached per type — see drawPlatform()
function getPlatformGradient(type, top, bottom) {
  if (!platformGradients[type]) {
    const grad = ctx.createLinearGradient(0, 0, 0, PLATFORM_H);
    grad.addColorStop(0, top);
    grad.addColorStop(1, bottom);
    platformGradients[type] = grad;
  }
  return platformGradients[type];
}

function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  let top = '#8ED9FF', bottom = '#2F6BFF';
  if (p.type === 'moving')   { top = '#B9D6FF'; bottom = '#1447D9'; }
  if (p.type === 'breaking') { top = '#9FB3E0'; bottom = '#3A4A8A'; }
  if (p.type === 'spring')   { top = '#EAF7FF'; bottom = '#5EEAD4'; }

  // shadowBlur is one of the most expensive canvas operations and we'd
  // otherwise pay for it on ~9 platforms every single frame — a thin
  // border reads almost as well as a glow and costs far less.
  ctx.fillStyle = getPlatformGradient(p.type, top, bottom);
  ctx.strokeStyle = 'rgba(111,168,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(0, 0, PLATFORM_W, PLATFORM_H, 7);
  ctx.fill();
  ctx.stroke();

  if (p.type === 'breaking') {
    ctx.strokeStyle = 'rgba(6,11,31,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W*0.35, 1); ctx.lineTo(PLATFORM_W*0.5, PLATFORM_H-1);
    ctx.moveTo(PLATFORM_W*0.68, 0); ctx.lineTo(PLATFORM_W*0.55, PLATFORM_H-2);
    ctx.stroke();
  }
  if (p.type === 'spring') {
    ctx.strokeStyle = '#0B1640'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W/2 - 8, 0);
    ctx.lineTo(PLATFORM_W/2 - 8, -10);
    ctx.lineTo(PLATFORM_W/2 + 8, -14);
    ctx.stroke();
  }
  ctx.restore();
}

function drawGrid() {
  const spacing = 46;
  ctx.save();
  ctx.strokeStyle = gridLineColor;
  ctx.lineWidth = 1;
  const offsetY = camY % spacing;
  for (let y = -spacing; y < H + spacing; y += spacing) {
    const yy = y + offsetY;
    ctx.beginPath(); ctx.moveTo(0, yy); ctx.lineTo(W, yy); ctx.stroke();
  }
  for (let x = 0; x < W + spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  for (const p of platforms) drawPlatform(p);
  drawPlayer();
}

function loop(t) {
  const dt = t - lastTime; lastTime = t;
  update(dt);
  draw();
  if (running) requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('saveStatus').textContent = '';
  document.getElementById('gameOverScreen').classList.remove('hidden');
  submitScore(score);
}

/* =========================================================
   CONTROLS
   ========================================================= */
function bindControls() {
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });
  canvas.addEventListener('touchstart', handleTouch, { passive:true });
  canvas.addEventListener('touchmove', handleTouch, { passive:true });
  canvas.addEventListener('touchend', () => { keys.left=false; keys.right=false; }, { passive:true });
  function handleTouch(e) {
    const t = e.touches[0]; if (!t) return;
    const rect = canvas.getBoundingClientRect();
    const rel = (t.clientX - rect.left) / rect.width;
    keys.left = rel < 0.5; keys.right = rel >= 0.5;
  }
}

/* =========================================================
   UI WIRING
   ========================================================= */
document.getElementById('playBtn').onclick = () => {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('leaderboardScreen').classList.add('hidden');
  resetGame();
  lastTime = performance.now();
  requestAnimationFrame(loop);
};
document.getElementById('retryBtn').onclick = () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('leaderboardScreen').classList.add('hidden');
  resetGame();
  lastTime = performance.now();
  requestAnimationFrame(loop);
};
resize();
bindControls();
setTheme('dark');
</script>
