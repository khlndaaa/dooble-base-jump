<script>
/* =========================================================
   FARCASTER MINI APP SDK — signal readiness
   ========================================================= */
(async () => {
  try {
    const { sdk } = await import('https://esm.sh/@farcaster/miniapp-sdk');
    await sdk.actions.ready(); // hides the host's splash screen
    window.__fcSdk = sdk;
  } catch (e) {
    console.log('Farcaster SDK not available (running outside Farcaster) — that is expected in a plain browser.');
  }
})();

/* =========================================================
   DAILY CHALLENGE — everyone gets the same platform layout on
   a given UTC day, so "Daily Challenge" runs are directly
   comparable. "Endless" mode stays fully random, as before.
   ========================================================= */
const LAUNCH_DATE_UTC = Date.UTC(2026, 6, 13); // 2026-07-13, day #1

function todayUTCString() {
  const d = new Date();
  return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0') + '-' + String(d.getUTCDate()).padStart(2, '0');
}
function dayNumber() {
  const now = Date.UTC(new Date().getUTCFullYear(), new Date().getUTCMonth(), new Date().getUTCDate());
  return Math.floor((now - LAUNCH_DATE_UTC) / 86400000) + 1;
}
function hashStringToInt(str) {
  let h = 2166136261;
  for (let i = 0; i < str.length; i++) { h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry32(seed) {
  let a = seed;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// DAILY_SEED and DAILY_GOAL are computed later, once the canvas is
// sized (W/H) and the physics/spawn functions are defined below — see
// findClimbableDailySeed() and its call near the bottom of this script.
// Assigning them here to `undefined` first documents the intent and
// avoids a temporal-dead-zone footgun if anything reads them too early.
let DAILY_SEED;
let DAILY_GOAL;

// `rand` is what spawnPlatform() actually calls. resetGame() points it
// at a fresh seeded generator for Daily Challenge (so retries reproduce
// the exact same run), or at Math.random for Endless.
let rand = Math.random;
let gameMode = 'daily'; // 'daily' | 'endless'

/* =========================================================
   DAILY SEED VALIDATION — a fixed daily platform layout is only fair
   if it's actually climbable. Unlike Endless (bad luck just means
   retry with a new random layout), a bad Daily seed would be broken
   for literally everyone, all day. So before committing to a seed, we
   run a fast headless simulation of a "perfect" run (same steering
   logic as a smart bot: always aim for the nearest safe platform
   above) far past the daily goal, and if it can't get there, we
   deterministically try the next candidate seed instead. Every device
   computes this the same way, so everyone still converges on the same
   final seed for a given day.
   ========================================================= */
function simulateClimbable(seed, targetCamY, maxVirtualMs) {
  const savedRand = rand;
  rand = mulberry32(seed);
  try {
    let simPlayer = { x: W / 2 - PLAYER_W / 2, y: H - 140, vx: 0, vy: JUMP_V };
    let simPlatforms = [{ x: W / 2 - PLATFORM_W / 2, y: H - 90, type: 'static', vx: 0 }];
    let y = H - 90;
    while (y > -H) { y -= 55 + rand() * 35; simPlatforms.push(spawnPlatform(y)); }

    let simCamY = 0;
    const dtMs = 1000 / 60;
    for (let elapsed = 0; elapsed < maxVirtualMs; elapsed += dtMs) {
      const centerX = simPlayer.x + PLAYER_W / 2;
      const candidates = simPlatforms.filter(p => !p.dead && p.y < simPlayer.y + PLAYER_H).sort((a, b) => b.y - a.y);
      let target = null;
      for (const p of candidates) { if (p.type === 'breaking') continue; target = p; break; }
      if (!target && candidates.length) target = candidates[0];

      let moveLeft = false, moveRight = false;
      if (target) {
        const diff = (target.x + PLATFORM_W / 2) - centerX;
        if (diff > 8) moveRight = true; else if (diff < -8) moveLeft = true;
      }
      const accel = 0.9;
      if (moveLeft) simPlayer.vx = Math.max(simPlayer.vx - accel, -6);
      else if (moveRight) simPlayer.vx = Math.min(simPlayer.vx + accel, 6);
      else simPlayer.vx *= 0.85;
      simPlayer.x += simPlayer.vx;
      if (simPlayer.x < -PLAYER_W) simPlayer.x = W;
      if (simPlayer.x > W) simPlayer.x = -PLAYER_W;

      simPlayer.vy += GRAVITY;
      simPlayer.y += simPlayer.vy;
      const threshold = H * 0.42;
      if (simPlayer.y < threshold) {
        const dy = threshold - simPlayer.y;
        simPlayer.y = threshold;
        simCamY += dy;
        for (const p of simPlatforms) p.y += dy;
      }
      for (const p of simPlatforms) {
        if (p.type === 'moving') { p.x += p.vx * 1.6; if (p.x < 10 || p.x > W - 10 - PLATFORM_W) p.vx *= -1; }
      }
      if (simPlayer.vy > 0) {
        for (const p of simPlatforms) {
          if (p.dead) continue;
          const px = simPlayer.x + 6, pw = PLAYER_W - 12;
          const withinX = px + pw > p.x && px < p.x + PLATFORM_W;
          const withinY = simPlayer.y + PLAYER_H > p.y && simPlayer.y + PLAYER_H < p.y + PLATFORM_H + 14;
          if (withinX && withinY) {
            if (p.type === 'breaking') { p.dead = true; continue; }
            simPlayer.vy = p.type === 'spring' ? SPRING_V : JUMP_V;
          }
        }
      }
      simPlatforms = simPlatforms.filter(p => p.y < H + 40 && !p.dead);
      while (simPlatforms.length < 9) {
        const topY = Math.min(...simPlatforms.map(p => p.y));
        simPlatforms.push(spawnPlatform(topY - (55 + rand() * 35)));
      }
      if (simPlayer.y > H + 60) return false; // the bot died — this seed is unsafe
      if (simCamY >= targetCamY) return true; // comfortably past the target — safe
    }
    return simCamY >= targetCamY;
  } finally {
    rand = savedRand;
  }
}
function findClimbableDailySeed(dateStr, targetMeters) {
  const targetCamY = targetMeters * 8;
  for (let attempt = 0; attempt < 30; attempt++) {
    const candidateStr = attempt === 0 ? dateStr : (dateStr + '#' + attempt);
    const candidateSeed = hashStringToInt(candidateStr);
    if (simulateClimbable(candidateSeed, targetCamY, 70000)) return candidateSeed;
  }
  return hashStringToInt(dateStr); // shouldn't happen, but never leave it unset
}

const STREAK_KEY = 'dbj_streak_v1';
function readStreak() {
  try {
    const raw = localStorage.getItem(STREAK_KEY);
    if (!raw) return { lastDate: null, streak: 0 };
    return JSON.parse(raw);
  } catch (e) { return { lastDate: null, streak: 0 }; }
}
function writeStreak(data) {
  try { localStorage.setItem(STREAK_KEY, JSON.stringify(data)); } catch (e) {}
}
// The streak's lastDate doubles as "last day the goal was completed" —
// registerTodaysRun() is only ever called once the player actually
// clears DAILY_GOAL, not just for opening the app, so a streak means
// "days in a row I completed the challenge", the same way a Wordle
// streak means "days in a row I solved it".
function isCompletedToday() {
  return readStreak().lastDate === todayUTCString();
}
function registerTodaysRun() {
  const today = todayUTCString();
  const data = readStreak();
  if (data.lastDate === today) return data.streak;
  const yesterday = new Date(Date.now() - 86400000);
  const yStr = yesterday.getUTCFullYear() + '-' + String(yesterday.getUTCMonth() + 1).padStart(2, '0') + '-' + String(yesterday.getUTCDate()).padStart(2, '0');
  const newStreak = data.lastDate === yStr ? data.streak + 1 : 1;
  writeStreak({ lastDate: today, streak: newStreak });
  return newStreak;
}

/* =========================================================
   WALLET — Base App / Farcaster wallet connection, read-only.
   Only used to identify the player for the leaderboard — no
   contract calls, no token, nothing that spends gas.
   ========================================================= */
const BASE_CHAIN_ID_HEX = '0x2105'; // 8453, Base mainnet
let walletAddress = null;

async function getEip1193Provider() {
  if (window.__fcSdk) {
    try {
      const provider = await window.__fcSdk.wallet.getEthereumProvider();
      if (provider) return provider;
    } catch (e) { /* fall through to window.ethereum */ }
  }
  return window.ethereum || null;
}

async function connectWallet() {
  const lineEl = document.getElementById('walletLine');
  const provider = await getEip1193Provider();
  if (!provider) {
    lineEl.textContent = 'no wallet found — try "Open in Base App" below';
    return;
  }
  try {
    const accounts = await provider.request({ method: 'eth_requestAccounts' });
    walletAddress = accounts && accounts[0];
    if (!walletAddress) { lineEl.textContent = 'no account returned'; return; }

    try {
      await provider.request({
        method: 'wallet_switchEthereumChain',
        params: [{ chainId: BASE_CHAIN_ID_HEX }],
      });
    } catch (switchErr) {
      console.warn('Could not switch to Base — continuing anyway, this is read-only.', switchErr);
    }

    const short = walletAddress.slice(0, 6) + '…' + walletAddress.slice(-4);
    lineEl.textContent = 'connected: ' + short;
  } catch (e) {
    console.error(e);
    // A plain browser with a locked/conflicting extension is the most
    // common cause here — steering people to the Base App sidesteps the
    // whole class of extension issues instead of trying to diagnose them.
    lineEl.textContent = 'connection rejected — try "Open in Base App" below';
  }
}

function playerLabel() {
  if (walletAddress) return walletAddress.slice(0, 6) + '…' + walletAddress.slice(-4);
  return 'anon-' + Math.random().toString(36).slice(2, 8);
}

async function submitScore(finalScore) {
  const statusEl = document.getElementById('saveStatus');
  if (!walletAddress) {
    statusEl.textContent = 'Connect your wallet to save this run to the leaderboard.';
    return;
  }
  try {
    statusEl.textContent = 'Saving score…';
    const body = { player: playerLabel(), score: finalScore };
    if (gameMode === 'daily') body.day = todayUTCString();
    const res = await fetch('/api/leaderboard', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error('bad response');
    statusEl.textContent = 'Saved to the leaderboard ✅';
  } catch (e) {
    console.error(e);
    statusEl.textContent = 'Could not save score (leaderboard not set up yet?)';
  }
}

async function loadLeaderboard() {
  const listEl = document.getElementById('leaderboardList');
  listEl.innerHTML = '<div class="leaderboard-empty">Loading…</div>';
  try {
    const qs = currentLeaderboardTab === 'daily' ? ('?day=' + encodeURIComponent(todayUTCString())) : '?scope=alltime';
    const res = await fetch('/api/leaderboard' + qs);
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    const entries = data.leaderboard || [];
    if (entries.length === 0) {

        <span class="leaderboard-player">${e.player}</span>
        <span class="leaderboard-score">${e.score} m</span>

  } catch (e) {
    console.error(e);
    listEl.innerHTML = '<div class="leaderboard-empty">Leaderboard not set up yet — see README.</div>';

}

/* =========================================================
   GAME: Doodle Jump clone on canvas
   ========================================================= */
const canvas = document.getElementById('game');
const scoreHudEl = document.getElementById('scoreHud');
let lastDisplayedScore = -1;
const ctx = canvas.getContext('2d');
let W, H, DPR;
let playerGlowGradient = null; // built once on first draw, see drawPlayer()

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.parentElement.getBoundingClientRect();
  W = rect.width; H = rect.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

const GRAVITY = 0.32;
const JUMP_V = -11.5;
const SPRING_V = -19;
const PLATFORM_W = 62, PLATFORM_H = 14;
const PLAYER_W = 40, PLAYER_H = 40;

let player, platforms, camY, score, running, keys;
let lastTime = 0;

function resetGame() {
  resize();
  rand = gameMode === 'daily' ? mulberry32(DAILY_SEED) : Math.random;
  player = { x: W/2 - PLAYER_W/2, y: H - 140, vx: 0, vy: JUMP_V, dir: 1 };
  platforms = [];
  camY = 0;
  score = 0;
  lastDisplayedScore = -1;
  running = true;
  keys = { left:false, right:false };

  // starting platform under the player
  platforms.push({ x: W/2 - PLATFORM_W/2, y: H - 90, type:'static', vx:0 });

  let y = H - 90;
  while (y > -H) {
    y -= 55 + rand()*35;
    platforms.push(spawnPlatform(y));
  }
}

function spawnPlatform(y) {
  const r = rand();
  const x = 20 + rand() * (W - 40 - PLATFORM_W);
  if (r < 0.12) return { x, y, type:'spring', vx:0 };
  if (r < 0.30) return { x, y, type:'moving', vx: (rand()<0.5?-1:1) * (1 + rand()) };
  if (r < 0.42) return { x, y, type:'breaking', vx:0 };
  return { x, y, type:'static', vx:0 };
}

function update(dt) {
  if (!running) return;

  // Normalize everything to a 60fps baseline so the game feels the same
  // whether the device renders 60fps or drops to 30fps — without this,
  // a slower device makes the cube move in visible jumps.
  const scale = Math.min(dt / (1000 / 60), 3); // capped so a stalled tab can't cause a huge leap

  const accel = 0.9 * scale;
  if (keys.left)  player.vx = Math.max(player.vx - accel, -6);
  else if (keys.right) player.vx = Math.min(player.vx + accel, 6);
  else player.vx *= Math.pow(0.85, scale);

  player.x += player.vx * scale;
  if (player.x < -PLAYER_W) player.x = W;
  if (player.x > W) player.x = -PLAYER_W;

  player.vy += GRAVITY * scale;
  player.y += player.vy * scale;

  // camera moves up when the player is above screen-center threshold
  const threshold = H * 0.42;
  if (player.y < threshold) {
    const dy = threshold - player.y;
    player.y = threshold;
    camY += dy;
    score = Math.max(score, Math.floor(camY / 8));
    for (const p of platforms) p.y += dy;
  }

  // move moving platforms
  for (const p of platforms) {
    if (p.type === 'moving') {
      p.x += p.vx * 1.6 * scale;
      if (p.x < 10 || p.x > W - 10 - PLATFORM_W) p.vx *= -1;
    }
  }

  // collisions (only while falling)
  if (player.vy > 0) {
    for (const p of platforms) {
      if (p.dead) continue;
      const px = player.x + 6, pw = PLAYER_W - 12;
      const withinX = px + pw > p.x && px < p.x + PLATFORM_W;
      const withinY = player.y + PLAYER_H > p.y && player.y + PLAYER_H < p.y + PLATFORM_H + 14;
      if (withinX && withinY) {
        if (p.type === 'breaking') { p.dead = true; continue; }
        player.vy = p.type === 'spring' ? SPRING_V : JUMP_V;
      }
    }
  }

  // drop platforms that fell off-screen, spawn new ones above.
  // Iterating backwards and splicing in place avoids allocating a brand
  // new array 60 times a second (what `.filter()` does) — small on its
  // own, but garbage-collector pressure from constant small allocations
  // is exactly the kind of thing that shows up as periodic frame-time
  // spikes/stutter on weaker mobile GPUs.
  for (let i = platforms.length - 1; i >= 0; i--) {
    const p = platforms[i];
    if (p.y >= H + 40 || p.dead) platforms.splice(i, 1);
  }
  while (platforms.length < 9) {
    let topY = platforms[0].y;
    for (let i = 1; i < platforms.length; i++) if (platforms[i].y < topY) topY = platforms[i].y;
    platforms.push(spawnPlatform(topY - (55 + rand()*35)));
  }

  if (score !== lastDisplayedScore) {
    scoreHudEl.textContent = score + ' m';
    lastDisplayedScore = score;
  }

  if (player.y > H + 60) endGame();
}

function drawPlayer() {
  const x = player.x, y = player.y;
  const s = 15.5; // cube half-edge in screen px
  ctx.save();
  ctx.translate(x + PLAYER_W/2, y + PLAYER_H/2 + 3);
  // subtle tilt in the direction of travel — keeps the cube feeling alive
  const tilt = Math.max(-0.22, Math.min(0.22, player.vx * 0.05));
  ctx.rotate(tilt);

  const top    = { x: 0,        y: -s * 1.65 };
  const right  = { x: s * 1.5,  y: -s * 0.78 };
  const left   = { x: -s * 1.5, y: -s * 0.78 };
  const center = { x: 0,        y: 0 };
  const botR   = { x: s * 1.5,  y: s * 0.95 };
  const botL   = { x: -s * 1.5, y: s * 0.95 };
  const botC   = { x: 0,        y: s * 1.7 };

  // gradients are always identical in this local, translated coordinate
  // space, so build once and reuse — creating one every frame is one of
  // the more expensive canvas calls and adds up on weaker devices.
  if (!playerGlowGradient) {
    playerGlowGradient = ctx.createRadialGradient(0, 0, 2, 0, 0, s * 2.6);
    playerGlowGradient.addColorStop(0, 'rgba(111,168,255,0.45)');
    playerGlowGradient.addColorStop(1, 'rgba(111,168,255,0)');
  }
  ctx.fillStyle = playerGlowGradient;
  ctx.beginPath();
  ctx.arc(0, 0, s * 2.6, 0, Math.PI * 2);
  ctx.fill();

  const drawFace = (pts, fill) => {
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.closePath();
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(234,241,255,0.35)';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  };

  // ears — drawn first so the top face's edge slightly overlaps their
  // base, making them read as attached to the cube rather than floating.
  const drawEar = (cx, cy, rot, fill, inner) => {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(rot);
    ctx.beginPath();
    ctx.ellipse(0, 0, s * 0.42, s * 0.85, 0, 0, Math.PI * 2);
    ctx.fillStyle = fill;
    ctx.fill();
    ctx.strokeStyle = 'rgba(234,241,255,0.35)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(0, s * 0.12, s * 0.2, s * 0.45, 0, 0, Math.PI * 2);
    ctx.fillStyle = inner;
    ctx.fill();
    ctx.restore();
  };
  drawEar(-s * 0.62, -s * 2.15, -0.32, '#7FB4FF', '#0032B8');
  drawEar(s * 0.72, -s * 2.28, 0.2, '#5E9CFF', '#0032B8');

  // left face (darkest), right face (mid), top face (brightest) — classic
  // isometric shading so the cube reads as 3D at a glance.
  drawFace([left, center, botC, botL], '#0032B8');
  drawFace([right, botR, botC, center], '#0052FF');
  drawFace([top, right, center, left], '#7FB4FF');

  // one big cartoon eye on the front-right face — this is what turns a
  // geometric cube into a character.
  const eyeX = s * 0.62, eyeY = -s * 0.02;
  ctx.beginPath();
  ctx.ellipse(eyeX, eyeY, s * 0.52, s * 0.58, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#F5F9FF';
  ctx.fill();
  ctx.strokeStyle = 'rgba(11,22,64,0.5)';
  ctx.lineWidth = 1;
  ctx.stroke();

  const lookX = Math.max(-0.5, Math.min(0.5, player.vx * 0.06));
  ctx.beginPath();
  ctx.ellipse(eyeX + s * (0.12 + lookX * 0.4), eyeY + s * 0.06, s * 0.24, s * 0.27, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#0B1640';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(eyeX + s * (0.04 + lookX * 0.4), eyeY - s * 0.08, s * 0.08, s * 0.09, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#F5F9FF';
  ctx.fill();

  ctx.restore();
}

const platformGradients = {}; // cached per type — see drawPlatform()
function getPlatformGradient(type, top, bottom) {
  if (!platformGradients[type]) {
    const grad = ctx.createLinearGradient(0, 0, 0, PLATFORM_H);
    grad.addColorStop(0, top);
    grad.addColorStop(1, bottom);
    platformGradients[type] = grad;
  }
  return platformGradients[type];
}

function drawPlatform(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  let top = '#8ED9FF', bottom = '#2F6BFF';
  if (p.type === 'moving')   { top = '#B9D6FF'; bottom = '#1447D9'; }
  if (p.type === 'breaking') { top = '#9FB3E0'; bottom = '#3A4A8A'; }
  if (p.type === 'spring')   { top = '#EAF7FF'; bottom = '#5EEAD4'; }

  // shadowBlur is one of the most expensive canvas operations and we'd
  // otherwise pay for it on ~9 platforms every single frame — a thin
  // border reads almost as well as a glow and costs far less.
  ctx.fillStyle = getPlatformGradient(p.type, top, bottom);
  ctx.strokeStyle = 'rgba(111,168,255,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(0, 0, PLATFORM_W, PLATFORM_H, 7);
  ctx.fill();
  ctx.stroke();

  if (p.type === 'breaking') {
    ctx.strokeStyle = 'rgba(6,11,31,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W*0.35, 1); ctx.lineTo(PLATFORM_W*0.5, PLATFORM_H-1);
    ctx.moveTo(PLATFORM_W*0.68, 0); ctx.lineTo(PLATFORM_W*0.55, PLATFORM_H-2);
    ctx.stroke();
  }
  if (p.type === 'spring') {
    ctx.strokeStyle = '#0B1640'; ctx.lineWidth = 3; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(PLATFORM_W/2 - 8, 0);
    ctx.lineTo(PLATFORM_W/2 - 8, -10);
    ctx.lineTo(PLATFORM_W/2 + 8, -14);
    ctx.stroke();
  }
  ctx.restore();
}

// Pre-render the dot-grid tile once into an offscreen canvas and reuse
// it as a repeating fill pattern. The old approach called arc()+fill()
// ~250+ times per frame (once per dot) — cheap on a desktop GPU, but
// expensive enough on weaker mobile webviews (like Base App's in-app
// browser) to visibly lag. A single fillRect() with a pattern costs
// roughly the same regardless of how many dots are visible.
let dotPattern = null;
let dotPatternColor = null;
const GRID_SPACING = 40;
function getDotPattern() {
  if (dotPattern && dotPatternColor === gridLineColor) return dotPattern;
  // Tile is sized in plain CSS-equivalent pixels (no DPR multiply) —
  // pattern tiling uses the source image's raw pixel dimensions as the
  // repeat interval, so multiplying by DPR here would silently double
  // the dot spacing on Retina-class screens. The dots are only ~1.4px
  // anyway, so we don't lose meaningfully crisp detail by keeping the
  // tile at 1x.
  const tile = document.createElement('canvas');
  tile.width = GRID_SPACING;
  tile.height = GRID_SPACING;
  const tctx = tile.getContext('2d');
  tctx.fillStyle = gridLineColor;
  tctx.beginPath();
  tctx.arc(GRID_SPACING / 2, GRID_SPACING / 2, 1.4, 0, Math.PI * 2);
  tctx.fill();
  dotPattern = ctx.createPattern(tile, 'repeat');
  dotPatternColor = gridLineColor;
  return dotPattern;
}
function drawGrid() {
  const offsetY = camY % GRID_SPACING;
  ctx.save();
  ctx.translate(0, offsetY);
  ctx.fillStyle = getDotPattern();
  ctx.fillRect(-GRID_SPACING, -GRID_SPACING - offsetY, W + GRID_SPACING * 2, H + GRID_SPACING * 2);
  ctx.restore();
}

function draw() {
  ctx.clearRect(0,0,W,H);
  drawGrid();
  for (const p of platforms) drawPlatform(p);
  drawPlayer();
}

function loop(t) {
  const dt = t - lastTime; lastTime = t;
  update(dt);
  draw();
  if (running) requestAnimationFrame(loop);
}

function endGame() {
  running = false;
  document.getElementById('finalScore').textContent = score;
  document.getElementById('saveStatus').textContent = '';
  const goalStatusEl = document.getElementById('goalStatus');

  const streakStatEl = document.getElementById('streakStat');
  if (gameMode === 'daily') {
    const alreadyCompletedBefore = isCompletedToday();
    const goalReachedNow = score >= DAILY_GOAL;

    if (goalReachedNow && !alreadyCompletedBefore) {
      const streakAfter = registerTodaysRun();
      document.getElementById('gameOverTitle').textContent = '🎉 Challenge Complete!';
      document.getElementById('finalStreak').textContent = streakAfter;
      goalStatusEl.textContent = `Goal reached (${DAILY_GOAL}m)! Streak is now ${streakAfter} 🔥`;
    } else if (goalReachedNow && alreadyCompletedBefore) {
      document.getElementById('gameOverTitle').textContent = 'Nice run!';
      document.getElementById('finalStreak').textContent = readStreak().streak;
      goalStatusEl.textContent = 'Already completed today — great replay score!';
    } else {
      document.getElementById('gameOverTitle').textContent = 'So close!';
      document.getElementById('finalStreak').textContent = readStreak().streak;
      goalStatusEl.textContent = `Need ${DAILY_GOAL - score}m more to complete today's challenge — try again!`;
    }
    document.getElementById('streakNum').textContent = readStreak().streak;
    streakStatEl.style.display = '';
  } else {
    document.getElementById('gameOverTitle').textContent = 'Game Over!';
    goalStatusEl.textContent = '';
    streakStatEl.style.display = 'none';
  }

  document.getElementById('gameOverScreen').classList.remove('hidden');
  submitScore(score);
}

/* =========================================================
   SHARE — the single highest-leverage growth lever for a game
   like this: let a player broadcast their score with one tap.
   Tries, in order, the richest option available to the current
   host, falling back gracefully so it always does *something*:
     1. Farcaster composeCast (classic Warpcast client)
     2. Web Share API (works great in Base App's in-app browser
        and most mobile browsers)
     3. Warpcast compose intent link (works anywhere, no SDK needed)
     4. Copy the share text to the clipboard as a last resort
   ========================================================= */
async function shareScore() {
  const statusEl = document.getElementById('saveStatus');
  const gameUrl = 'https://dooble-base-jump.vercel.app';
  const text = gameMode === 'daily'
    ? `Dooble Base Jump — Day #${dayNumber()}\nI jumped ${score}m 🎲🔵 🔥 streak: ${readStreak().streak}\nCan you beat it on today's run?`
    : `I jumped ${score}m in Dooble Base Jump 🎲🔵 Can you beat me?`;
  statusEl.textContent = 'Opening share…';

  if (window.__fcSdk && window.__fcSdk.actions && window.__fcSdk.actions.composeCast) {
    try {
      await window.__fcSdk.actions.composeCast({ text, embeds: [gameUrl] });
      statusEl.textContent = 'Shared! 🎉';
      return;
    } catch (e) { /* fall through */ }
  }

  // Web Share API turned out unreliable across both desktop AND touch
  // Windows laptops (maxTouchPoints/pointer:coarse both report true on
  // many non-mobile devices, and the native flyout can silently resolve
  // without showing anything if no share targets are registered). Skipping
  // it entirely in favor of a plain link is less "native" on real phones
  // but is the one path that reliably does something visible everywhere.

  // window.open() does NOT throw when a popup is blocked — it silently
  // returns null. Missing that check was the actual bug: on desktop,
  // a blocked popup meant the button looked like it did nothing at all.
  const intentUrl = 'https://warpcast.com/~/compose?text=' + encodeURIComponent(text) + '&embeds[]=' + encodeURIComponent(gameUrl);
  let opened = null;
  try {
    opened = window.open(intentUrl, '_blank');
  } catch (e) { opened = null; }

  if (opened) {
    statusEl.textContent = 'Opened share composer in a new tab ↗';
    return;
  }

  try {
    await navigator.clipboard.writeText(text + ' ' + gameUrl);
    statusEl.textContent = 'Popup blocked — copied share text to clipboard instead!';
  } catch (e) {
    statusEl.textContent = 'Could not share automatically — screenshot it instead!';
  }
}
document.getElementById('shareBtn').addEventListener('click', shareScore);

/* =========================================================
   CONTROLS
   ========================================================= */
function bindControls() {
  window.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = true;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
  });
  window.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a') keys.left = false;
    if (e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
  });
  canvas.addEventListener('touchstart', handleTouch, { passive:true });
  canvas.addEventListener('touchmove', handleTouch, { passive:true });
  canvas.addEventListener('touchend', () => { keys.left=false; keys.right=false; }, { passive:true });
  function handleTouch(e) {
    const t = e.touches[0]; if (!t) return;
    const rect = canvas.getBoundingClientRect();
    const rel = (t.clientX - rect.left) / rect.width;
    keys.left = rel < 0.5; keys.right = rel >= 0.5;
  }
}

/* =========================================================
   UI WIRING
   ========================================================= */
function startRun(mode) {
  gameMode = mode;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  document.getElementById('leaderboardScreen').classList.add('hidden');
  resetGame();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}
document.getElementById('playDailyBtn').onclick = () => startRun('daily');
document.getElementById('playEndlessBtn').onclick = () => startRun('endless');
document.getElementById('retryBtn').onclick = () => startRun(gameMode);
resize();

// Now that W/H are real and spawnPlatform/physics constants exist,
// resolve the actual seed for today — validated to be climbable well
// past the daily goal (see findClimbableDailySeed above).
DAILY_SEED = findClimbableDailySeed(todayUTCString(), 400);
const goalRandom = mulberry32(DAILY_SEED ^ 0x51ED270B);
DAILY_GOAL = Math.round((120 + goalRandom() * 100) / 10) * 10;

bindControls();
setTheme('dark');
function refreshStartScreenDailyInfo() {
  document.getElementById('dayBadge').textContent = 'Day #' + dayNumber();
  document.getElementById('streakNum').textContent = readStreak().streak;
  document.getElementById('goalNum').textContent = DAILY_GOAL + 'm';
  document.getElementById('goalTagline').textContent = isCompletedToday()
    ? '✅ Today\'s challenge complete — play again for a higher score!'
    : `Today's goal: reach ${DAILY_GOAL}m. Same platforms for everyone.`;
}
refreshStartScreenDailyInfo();
</script>
</body>
</html>
